name: CI / Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Supabase (prod) — GitHub Secrets'tan gelir
  NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_DB_PASSWORD:          ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_PROJECT_ID:           ${{ secrets.SUPABASE_PROJECT_ID }}

# ────────────────────────────────────────────────────────────
# JOB 1 — Lint + Type check (her PR ve push'da)
# ────────────────────────────────────────────────────────────
jobs:
  check:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ────────────────────────────────────────────────────────
  # JOB 2 — Supabase migration kontrolü (PR'da)
  # ────────────────────────────────────────────────────────
  migration-check:
    name: 🗃️ Migration Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Run migrations (dry-run)
        run: supabase db reset --db-url postgresql://postgres:postgres@localhost:54322/postgres

      - name: Check RLS policies
        run: |
          supabase db diff --schema public || true

      - name: Stop local Supabase
        run: supabase stop --no-backup

  # ────────────────────────────────────────────────────────
  # JOB 3 — Preview deploy (PR açıldığında — Vercel)
  # ────────────────────────────────────────────────────────
  preview:
    name: 🔎 Preview Deploy
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deploy\n\n**URL:** ${{ steps.deploy.outputs.url }}\n\nBu PR'ın canlı önizlemesi yukarıdaki adreste hazır.`
            })

  # ────────────────────────────────────────────────────────
  # JOB 4 — Production deploy (main'e push)
  # ────────────────────────────────────────────────────────
  deploy-prod:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    needs: [check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://ev-yemekleri.vercel.app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Supabase migration'ları uygula ──
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB migrations
        run: |
          supabase db push \
            --db-url "postgresql://postgres.${{ secrets.SUPABASE_PROJECT_ID }}:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-0-eu-central-1.pooler.supabase.com:6543/postgres"

      # ── Vercel'e deploy ──
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # ── Deployment sonrası sağlık kontrolü ──
      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://ev-yemekleri.vercel.app/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"
